<div class="container mt-4">
    <div class="row">
        <div class="col-9  m-auto">
            <div class="row align-items-center">
                <div class="col-2 col-sm-1"
                    style=" margin-top: 15px; width: 40px;height: 40px; border-radius: 12px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225))">
                    <fa-icon [icon]="fabell" style="color: white; font-size: 25px;margin-left: -7px;" />
                </div>
                <div class="col-6 col-sm-5 col-md-4">
                    <h4><b>Reminders</b></h4>
                    <p>{{upcomingreminder.length}} active reminders</p>
                </div>
                <div class="col-12 col-sm-6 col-md-7 text-sm-end mt-3 mt-sm-0">
                    <button class="bg-danger text-white" (click)="onAddReminder()"
                        style="font-size: px;width: 140px; margin-bottom: 10px; border:none;border-radius: 10px;padding: 5px 10px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225));">+New
                        Reminder</button>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-9  m-auto">
            @if (upcomingreminder.length===0) {
                <div class="row">
                    <div class="col-12 m-auto shadow d-flex flex-column justify-content-center align-items-center "
                        style="height: 100px; border-radius: 15px; background-color: white;">
                        <fa-icon [icon]="faalarmclock" style="font-size: 30px;color: gray;" />
                        <p style="color: gray;">no active remainders</p>
                    </div>
                </div>
            }
            <div class="row mt-3">
                @for (item of reminderdetailes; track $index) {
                    <div class="col-12 col-md-6 mb-2 ">
                        <div class="shadow p-2 h-100" style="border-radius:10px;">
                            <div class="row ">
                                <div class="col-2 col-sm-1"
                                    style=" margin-top: 15px;margin-left: 25px; width: 30px;height: 30px; border-radius: 5px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225))">
                                    <fa-icon [icon]="fabell" style="color: white; font-size: 17px;margin-left: -7px;" />
                                </div>
                                <div class="col-7 col-sm-8">
                                    <p style="font-size: 12px; font-weight: bold;display: inline;">{{item.remindertitle}}</p>
                                    <p style="margin: 0;font-size: 12px;">{{item.reminderTime}}</p>
                                    <button
                                        style="margin-bottom: 10px;font-size: 12px; border-radius: 25px; border:none;color: rgb(0, 21, 255); background-color: rgb(130, 206, 244);">scheduled</button>
                                </div>
                    
                            </div>
                        </div>
                    </div>
                }
                

            </div>
            
            
        </div>
    </div>
</div>


<div class="modal" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- Modal Header -->
            <div class="modal-header">
                <h4 class="modal-title">ADD Reminder</h4>
                <button type="button" (click)="onCloseEvents()" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- Modal body -->
            <div class="modal-body">
                <form action="/action_page.php">
                    <div class="mb-3 mt-3">
                        <label for="title" class="form-label">Reminder Title</label>
                        <input type="text" [(ngModel)]="reminderlist.remindertitle" class="form-control" id="title"
                            placeholder="Enter Title" name="Remindertitle">
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date & Time</label>
                        <input type="datetime-local" [(ngModel)]="reminderlist.reminderTime" class="form-control" id="date"
                            placeholder="Enter date" name="ReminderDateand time">
                    </div>
                    
                    <button class="btn btn-primary me-2" (click)="saveremainder()">Add Reminder</button>

                </form>
            </div>

            <!-- Modal footer -->
            <div class="modal-footer">
                <button type="button" (click)="onCloseEvents()" class="btn btn-danger"
                    data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>
