<div class="container mt-4">
    <div class="row">
        <div class="col-9  m-auto">
            <div class="row align-items-center ">
                <div class="col-2 col-sm-1"
                    style=" margin-top: 15px; width: 40px;height: 40px; border-radius: 12px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225))">
                    <fa-icon [icon]="faclipboard" style="color: white; font-size: 25px;margin-left: -7px;" />
                </div>
                <div class="col-6 col-sm-5 col-md-4">
                    <h4><b>Notes</b></h4>
                    <p>{{notesList.length}} active notes</p>
                </div>
                <div class="col-12 col-sm-6 col-md-7 text-sm-end mt-3 mt-sm-0 ">
                    <button (click)="onOpenEvents()" class="bg-danger text-white"
                        style="font-size: px;width: 140px; margin-bottom: 10px; border:none;border-radius: 10px;padding: 5px 10px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225));">+New
                        Notes</button>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-9  m-auto">
            @if (notesList.length===0) {
                <div class="row">
                    <div class="col-12 m-auto shadow d-flex flex-column justify-content-center align-items-center "
                        style="height: 100px; border-radius: 15px; background-color: white;">
                        <fa-icon [icon]="fafileslines" style="font-size: 30px;color: gray;" />
                        <p style="color: gray;">no active notes</p>
                    </div>
                </div>
            }
            
            <div class="row mt-3">
                @for (item of notesList; track $index) {
                    <div class="col-12 col-md-6 mb-3">
                        <div class="shadow p-2 h-100" style="border-radius:10px;">
                            <div class="row ">
                                <div class="col-2 col-sm-1"
                                    style=" margin-top: 15px;margin-left: 25px; width: 30px;height: 30px; border-radius: 5px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225))">
                                    <fa-icon [icon]="faclipboard" style="color: white; font-size: 17px;margin-left: -7px;" />
                                </div>
                                <div class="col-7 col-sm-8">
                                    <p style="font-size: 12px; font-weight: bold;display: inline;">{{item.notesTitle}}</p>
                                    <p style="margin: 0;font-size: 12px;">{{item.notesHead}}</p>
                                </div>
                                <div class="col-3 col-sm-2 text-end">
                                    <button (click)="onEdit(item)" style="background-color: white; ; margin-bottom: 10px; border:none;">
                                        <fa-icon [icon]="faPenToSquare" style="color: black;" /></button>
                                    <button (click)="deletenotes(item.id)"
                                        style="background-color: white; margin-left:0%; margin-bottom: 10px; border:none;">
                                        <fa-icon [icon]="fatrashcan" style="color: red;" /></button>
                                </div>
                            </div>
                        </div>
                    
                    </div>
                }
            
            
            </div>
    
        </div>
    </div>
</div>


<div class="modal" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- Modal Header -->
            <div class="modal-header">
                <h4 class="modal-title">ADD Notes</h4>
                <button type="button" (click)="onCloseEvents()" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- Modal body -->
            <div class="modal-body">
                <form action="/action_page.php">
                    <div class="mb-3 mt-3">
                        <label for="title" class="form-label">Notes Title</label>
                        <input type="text" [(ngModel)]="Notesobj.notesTitle"  class="form-control" id="title"
                            placeholder="Enter Title" name="NoteTitle">
                    </div>
                    <p>{{Notesobj.notesHead}}</p>
                    <div class="mb-3">
                        <label for="notes"  class="form-label">Notes Head:</label>
                        <textarea [(ngModel)]="Notesobj.notesHead" name="NoteHead" class="form-control" rows="4"  placeholder="Write your note..."></textarea>
                    </div>
                
                    <button class="btn btn-primary me-2" (click)="onSaveNotes()">Save Event</button>
            
                    <button class="btn btn-primary me-2" (click)="onUpdatenotes(Notesobj.id)">update Event</button>
                


                </form>
            </div>

            <!-- Modal footer -->
            <div class="modal-footer">
                <button type="button" (click)="onCloseEvents()" class="btn btn-danger"
                    data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>
