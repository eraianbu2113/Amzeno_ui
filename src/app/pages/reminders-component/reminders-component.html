<div class="container mt-4">
    <div class="row">
        <div class="col-9  m-auto">
            <div class="row align-items-center">
                <div class="col-2 col-sm-1"
                    style=" margin-top: 15px; width: 40px;height: 40px; border-radius: 12px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225))">
                    <fa-icon [icon]="fabell" style="color: white; font-size: 25px;margin-left: -7px;" />
                </div>
                <div class="col-6 col-sm-5 col-md-4">
                    <h4><b>Reminders</b></h4>
                    <p>0 active reminders</p>
                </div>
                <div class="col-12 col-sm-6 col-md-7 text-sm-end mt-3 mt-sm-0">
                    <button class="bg-danger text-white"
                        style="font-size: px;width: 140px; margin-bottom: 10px; border:none;border-radius: 10px;padding: 5px 10px; background-image: linear-gradient(to bottom right, rgb(0, 8, 255) , rgb(81, 189, 225));">+New
                        Meeting</button>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-9  m-auto">
            <div class="row">
                <div class="col-12 m-auto shadow d-flex flex-column justify-content-center align-items-center " style="height: 100px; border-radius: 15px; background-color: white;">
                    <fa-icon [icon]="faalarmclock" style="font-size: 30px;color: gray;"/>
                    <p style="color: gray;">no active remainders</p>
                </div>
            </div>
            
        </div>
    </div>
    <!-- <input type="datetime-local" [(ngModel)]="reminderTime">
    
    <button (click)="setReminder()">
        Set Reminder
    </button> -->
</div>
